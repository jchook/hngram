name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/jchook/hngram-api
  CADDY_IMAGE: ghcr.io/jchook/hngram-caddy
  INGEST_IMAGE: ghcr.io/jchook/hngram-ingest

jobs:
  build-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=long
      - uses: docker/build-push-action@v7
        with:
          context: ./server
          file: ./server/Dockerfile
          target: api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

  build-ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.INGEST_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=long
      - uses: docker/build-push-action@v7
        with:
          context: ./server
          file: ./server/Dockerfile
          target: ingest
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=ingest
            type=gha,scope=api
          cache-to: type=gha,mode=max,scope=ingest

  build-caddy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.CADDY_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=long
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./server/etc/caddy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=caddy
          cache-to: type=gha,mode=max,scope=caddy

  deploy:
    runs-on: ubuntu-latest
    needs: [build-api, build-caddy, build-ingest]
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd ${{ secrets.DEPLOY_PATH }}
            git pull --ff-only
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f

      - name: Smoke test + warm landing-page cache
        run: |
          set -e
          BASE=https://hngram.com

          # Wait for the API to be back online after recreate. --retry covers
          # the container-restart window; if it can't reach the API after ~60s
          # the deploy is broken and we want CI to fail loudly.
          echo "Waiting for API health..."
          curl -fsS -o /dev/null --retry 30 --retry-delay 2 --retry-all-errors \
            "$BASE/api/health"
          echo "API healthy."

          # Pre-warm the moka response cache for the two phrases the frontend
          # loads by default. The first visitor after a deploy now lands on a
          # warm cache instead of paying the 600ms CH cold-query cost.
          echo "Warming landing-page cache..."
          for phrase in rust python; do
            curl -fsS -o /dev/null "$BASE/api/ngram?phrase=$phrase"
          done
          echo "Cache warmed."
