x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  caddy:
    logging: *default-logging
    build:
      context: .
      dockerfile: server/etc/caddy/Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    restart: unless-stopped

  api:
    logging: *default-logging
    init: true
    read_only: true
    tmpfs:
      - /tmp
    build:
      context: ./server
      dockerfile: Dockerfile
    volumes:
      - ${SECRETS_DIR:-/srv/hngram/secrets}/clickhouse_password.txt:/run/secrets/clickhouse_password:ro
    environment:
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_USER=hngram
      - CLICKHOUSE_PASSWORD_FILE=/run/secrets/clickhouse_password
      - RUST_LOG=warn
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: unless-stopped

  clickhouse:
    logging: *default-logging
    init: true
    image: clickhouse/clickhouse-server:26.3-alpine
    secrets:
      - clickhouse_password
    volumes:
      - ./server/data/clickhouse:/var/lib/clickhouse
      - ./server/etc/clickhouse/config.xml:/etc/clickhouse-server/config.d/custom.xml:ro
      - ./server/etc/clickhouse/config.prod.xml:/etc/clickhouse-server/config.d/prod.xml:ro
      - ./server/etc/clickhouse/users.xml:/etc/clickhouse-server/users.d/custom.xml:ro
      - ./server/etc/clickhouse/users.prod.xml:/etc/clickhouse-server/users.d/prod.xml:ro
      - ./server/etc/clickhouse/init:/docker-entrypoint-initdb.d:ro
    environment:
      - CLICKHOUSE_DB=hn_ngram
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

secrets:
  clickhouse_password:
    file: ${SECRETS_DIR:-/srv/hngram/secrets}/clickhouse_password.txt

volumes:
  caddy_data:
  caddy_config:
