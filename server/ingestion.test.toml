# Extreme pruning for smoke tests — very small dataset, fast iteration.
#
# Usage: just ingest-test

[process]
output = "parquet"
start = "2011-01"
end = "2011-12"

[process.prune.1]
min_global = 500
min_bucket = 100

[process.prune.2]
min_global = 20000
min_bucket = 500

[process.prune.3]
min_global = 50000
min_bucket = 1000
