# Extreme pruning for smoke tests — very small dataset, fast iteration.
#
# Usage: just ingest-test

[process]
output = "parquet"
max_entries = 20000000
producer_count = 2

[process.prune.1]
min_global = 100
min_bucket = 20

[process.prune.2]
min_global = 5000
min_bucket = 50

[process.prune.3]
min_global = 2000
min_bucket = 30
