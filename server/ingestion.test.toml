# Extreme pruning for quick smoke tests.
# Only keeps the most common n-grams — tiny dataset, fast iterations.
#
# Usage: cargo run -p ingestion -- process --output parquet --config ingestion.test.toml

[pruning.1]
min_global = 100
min_bucket = 20

[pruning.2]
min_global = 5000
min_bucket = 50

[pruning.3]
min_global = 2000
min_bucket = 30
