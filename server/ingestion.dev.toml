# Aggressive pruning for fast dev/testing.
# Only keeps very common n-grams — much smaller dataset.
#
# Usage: cargo run -p ingestion -- process --config ingestion.dev.toml

[process]
output = "parquet"
max_entries = 20000000
producer_count = 2

[process.prune.1]
min_global = 0
min_bucket = 5

[process.prune.2]
min_global = 500
min_bucket = 10

[process.prune.3]
min_global = 200
min_bucket = 15
