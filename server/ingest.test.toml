# Smoke-test config: run the full pipeline (process + import) on one year
# of data with monthly buckets. Produces a small but meaningful dataset —
# enough vocabulary to test queries and the frontend while keeping
# processing and import fast.
#
# Usage: just ingest-test

[process]
output = "parquet"
start = "2024-01"
end = "2024-12"
bucket_granularity = "monthly"

[process.prune.1]
min_global = 100    # common words (~5-10K unigrams)
min_bucket = 2      # appear at least twice in a month
min_flush = 2

[process.prune.2]
min_global = 50     # recognizable phrases (~10-20K bigrams)
min_bucket = 2
min_flush = 3

[process.prune.3]
min_global = 20     # real expressions (~5-10K trigrams)
min_bucket = 2
min_flush = 5
